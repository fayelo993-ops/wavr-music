<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WAVR Music</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">WAVR</div>

<div class="genre-tabs">

<button onclick="searchGenre('pop')">Pop</button>
<button onclick="searchGenre('hip hop')">Hip Hop</button>
<button onclick="searchGenre('afrobeats')">Afrobeats</button>
<button onclick="searchGenre('jazz')">Jazz</button>

</div>

</header>


<section class="search">

<h1>Discover Your Sound</h1>

<div class="search-bar">

<input
type="text"
id="searchInput"
placeholder="Rechercher un artiste..."
>

<button onclick="doSearch()">Search</button>

</div>

</section>


<main>

<h2 id="sectionTitle">Trending</h2>

<div id="tracksGrid" class="tracks-grid">

Chargement...

</div>

</main>


<div class="player" id="player">

<div class="player-info">

<img id="playerCover">

<div>

<div id="playerTitle"></div>
<div id="playerArtist"></div>

</div>

</div>


<div class="controls">

<button onclick="prevTrack()">⏮</button>

<button onclick="togglePlay()" id="playBtn">▶</button>

<button onclick="nextTrack()">⏭</button>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
