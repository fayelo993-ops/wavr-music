<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WAVR — Musique</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>

  <!-- HEADER -->
  <header>
    <div class="logo">WAVR</div>
    <div class="genre-tabs" id="genreTabs">
      <button class="genre-tab active" onclick="searchGenre('pop', this)">Pop</button>
      <button class="genre-tab" onclick="searchGenre('hip hop', this)">Hip-Hop</button>
      <button class="genre-tab" onclick="searchGenre('afrobeats', this)">Afrobeats</button>
      <button class="genre-tab" onclick="searchGenre('jazz', this)">Jazz</button>
      <button class="genre-tab" onclick="searchGenre('lofi', this)">Lofi</button>
    </div>
  </header>

  <!-- SEARCH -->
  <div class="search-section">
    <h1 class="search-title">Discover<br><span>Your Sound.</span></h1>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Rechercher un artiste, titre..." onkeydown="handleKey(event)" />
      <button class="search-btn" onclick="doSearch()">Rechercher</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="section-header">
      <div class="section-title" id="sectionTitle">Tendances Pop</div>
      <div class="section-count" id="sectionCount"></div>
    </div>
    <div class="tracks-grid" id="tracksGrid">
      <div class="loading"><div class="spinner"></div>Chargement...</div>
    </div>
  </div>

  <!-- PLAYER -->
  <div class="player" id="player">
    <div class="player-track">
      <div class="player-cover"><img id="playerCover" src="" alt="" /></div>
      <div>
        <div class="player-title" id="playerTitle">—</div>
        <div class="player-artist" id="playerArtist">—</div>
      </div>
    </div>
    <div class="player-controls">
      <div class="player-btns">
        <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
        <button class="ctrl-btn main-play" id="mainPlayBtn" onclick="togglePlay()">▶</button>
        <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
      </div>
      <div class="progress-bar">
        <span class="progress-time" id="currentTime">0:00</span>
        <div class="progress-track" onclick="seekTo(event)">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-time" id="totalTime">0:30</span>
      </div>
    </div>
    <div class="player-volume">
      <span class="volume-icon">🔊</span>
      <div class="volume-slider" onclick="setVolume(event)">
        <div class="volume-fill" id="volumeFill"></div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
